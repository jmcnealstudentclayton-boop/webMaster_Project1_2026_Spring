<nav class="bg-slate-800 border-b border-slate-700 px-6 py-3 sticky top-0 z-50" aria-label="Main navigation">
    <div class="max-w-6xl mx-auto flex items-center justify-between flex-wrap gap-3">
        <a href="/" id="nav-home-brand" class="text-xl font-bold text-indigo-500 hover:text-indigo-400 no-underline" aria-label="MovieDB Home">MovieDB</a>

        <!-- Hamburger button (mobile) -->
        <button id="nav-toggle" type="button"
                class="sm:hidden p-2 rounded-lg text-slate-400 hover:text-slate-200 hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                aria-controls="nav-menu" aria-expanded="false" aria-label="Toggle navigation menu">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path id="hamburger-icon" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                <path id="close-icon" class="hidden" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>

        <!-- Nav links -->
        <ul id="nav-menu" class="hidden sm:flex gap-6 list-none flex-wrap w-full sm:w-auto">
            <li><a data-nav="/" class="block py-2 sm:py-0 text-slate-400 hover:text-slate-200 text-sm transition-colors no-underline">Home</a></li>
            <li><a data-nav="/pages/movies/" class="block py-2 sm:py-0 text-slate-400 hover:text-slate-200 text-sm transition-colors no-underline">Browse Movies</a></li>
            <li><a data-nav="/pages/reviews/" class="block py-2 sm:py-0 text-slate-400 hover:text-slate-200 text-sm transition-colors no-underline">Reviews</a></li>
            <li><a data-nav="/pages/watchlist/" class="block py-2 sm:py-0 text-slate-400 hover:text-slate-200 text-sm transition-colors no-underline">Watchlist</a></li>

        </ul>
    </div>

    <script>
        (function() {
            // Resolve base path for GitHub Pages subpath hosting
            var p = window.location.pathname;
            var repo = 'webMaster_Project1_2026_Spring';
            var idx = p.indexOf(repo);
            var base = idx !== -1 ? p.substring(0, idx + repo.length) : '';

            // Fix brand link
            var brand = document.getElementById('nav-home-brand');
            if (brand) brand.href = base + '/';

            // Fix all nav links
            document.querySelectorAll('[data-nav]').forEach(function(a) {
                a.href = base + a.getAttribute('data-nav');
            });

            // Hamburger toggle
            var btn = document.getElementById('nav-toggle');
            var menu = document.getElementById('nav-menu');
            var hIcon = document.getElementById('hamburger-icon');
            var cIcon = document.getElementById('close-icon');
            if (!btn || !menu) return;
            btn.addEventListener('click', function() {
                menu.classList.toggle('hidden');
                var isOpen = !menu.classList.contains('hidden');
                btn.setAttribute('aria-expanded', isOpen);
                if (hIcon) hIcon.classList.toggle('hidden', isOpen);
                if (cIcon) cIcon.classList.toggle('hidden', !isOpen);
            });
        })();
    </script>
</nav>
