<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Details | MovieDB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../css/styles.css">
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen flex flex-col font-sans">
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div id="nav-placeholder"></div>

    <main id="main-content" class="flex-1 max-w-6xl w-full mx-auto px-6 py-8" role="main">
        <!-- Back link -->
        <a href="./" class="text-indigo-400 hover:text-indigo-300 text-sm mb-6 inline-block">&larr; Back to Browse</a>

        <!-- Loading spinner -->
        <div id="detail-spinner" class="flex justify-center py-12">
            <div class="w-8 h-8 border-4 border-slate-600 border-t-indigo-500 rounded-full animate-spin"></div>
        </div>

        <!-- Movie header (filled by JS) -->
        <div id="movie-header" class="hidden mb-8">
            <h1 id="movie-title" class="text-3xl font-bold mb-1"></h1>
            <p id="movie-meta" class="text-slate-400 mb-2"></p>
            <div id="movie-genres" class="flex flex-wrap gap-2 mb-4"></div>
            <p id="movie-desc" class="text-slate-300 leading-relaxed max-w-3xl"></p>
        </div>

        <!-- Reviews section -->
        <section id="reviews-section" class="hidden">
            <h2 class="text-2xl font-bold mb-1">Reviews</h2>
            <p id="review-count" class="text-slate-400 text-sm mb-4"></p>
            <div id="reviews-list" class="space-y-4">
                <!-- Rendered by JS -->
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../../js/loadInserts.js"></script>
    <script type="module" src="../../js/pages/movies/detail.js"></script>
</body>
</html>
