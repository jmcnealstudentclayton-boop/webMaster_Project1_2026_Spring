<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Movies | MovieDB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../css/styles.css">
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen flex flex-col font-sans">
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div id="nav-placeholder"></div>

    <main id="main-content" class="flex-1 max-w-6xl w-full mx-auto px-6 py-8" role="main">
        <h1 class="text-3xl font-bold mb-2">Browse Movies</h1>
        <p class="text-slate-400 mb-6">Search and explore our collection of 200+ movies.</p>

        <!-- Search / filter / sort bar -->
        <div class="flex flex-wrap gap-3 mb-6">
            <input type="text" id="search-input" placeholder="Search by title..."
                   aria-label="Search movies by title"
                   class="flex-1 min-w-[200px] px-4 py-2 bg-slate-800 border border-slate-700 rounded-lg text-slate-200 placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/30">
            <select id="genre-filter"
                    aria-label="Filter by genre"
                    class="px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg text-slate-200 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/30">
                <option value="">All Genres</option>
            </select>
            <select id="sort-select"
                    aria-label="Sort movies"
                    class="px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg text-slate-200 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/30">
                <option value="title-asc">Title A–Z</option>
                <option value="title-desc">Title Z–A</option>
                <option value="year-desc">Newest First</option>
                <option value="year-asc">Oldest First</option>
                <option value="runtime-desc">Longest First</option>
                <option value="runtime-asc">Shortest First</option>
            </select>
        </div>

        <!-- Loading spinner -->
        <div id="movie-spinner" class="hidden flex justify-center py-12">
            <div class="w-8 h-8 border-4 border-slate-600 border-t-indigo-500 rounded-full animate-spin"></div>
        </div>

        <!-- Results count -->
        <p id="movie-count" class="text-slate-400 text-sm mb-4"></p>

        <div id="movie-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
            <!-- Movie cards rendered by JS -->
        </div>

        <!-- Pagination -->
        <nav id="movie-pagination" class="flex items-center justify-center gap-4 mt-8" aria-label="Movie pagination">
        </nav>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../../js/loadInserts.js"></script>
    <script type="module" src="../../js/pages/movies/index.js"></script>
</body>
</html>
