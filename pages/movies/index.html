<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Movies | MovieDB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../css/styles.css">
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen flex flex-col font-sans">
    <div id="nav-placeholder"></div>

    <main class="flex-1 max-w-6xl w-full mx-auto px-6 py-8">
        <h1 class="text-3xl font-bold mb-2">Browse Movies</h1>
        <p class="text-slate-400 mb-6">Search and explore our collection of 200+ movies.</p>

        <!-- Search / filter bar -->
        <div class="mb-6">
            <input type="text" id="search-input" placeholder="Search by title..."
                   class="w-full sm:w-96 px-4 py-2 bg-slate-800 border border-slate-700 rounded-lg text-slate-200 placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/30">
        </div>

        <div id="movie-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
            <!-- Movie cards rendered by JS -->
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../../js/loadInserts.js"></script>
    <script type="module" src="../../js/pages/movies/index.js"></script>
</body>
</html>
