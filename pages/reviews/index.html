<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviews | MovieDB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../css/styles.css">
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen flex flex-col font-sans">
    <div id="nav-placeholder"></div>

    <main class="flex-1 max-w-6xl w-full mx-auto px-6 py-8">
        <h1 class="text-3xl font-bold mb-2">Leave a Review</h1>
        <p class="text-slate-400 mb-6">Share your thoughts on a movie you've watched.</p>

        <!-- Review Form -->
        <form id="review-form" class="bg-slate-800 border border-slate-700 rounded-lg p-6 max-w-xl">
            <div class="mb-4">
                <label for="movie-select" class="block text-sm text-slate-400 mb-1">Movie</label>
                <select id="movie-select" required
                        class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-slate-200 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/30">
                    <option value="">— Select a movie —</option>
                </select>
            </div>

            <div class="mb-4">
                <label for="user-select" class="block text-sm text-slate-400 mb-1">Your Name</label>
                <select id="user-select" required
                        class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-slate-200 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/30">
                    <option value="">— Select your user —</option>
                </select>
            </div>

            <div class="mb-4">
                <label for="rating-input" class="block text-sm text-slate-400 mb-1">Rating (1–10)</label>
                <input type="number" id="rating-input" min="1" max="10" required
                       class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-slate-200 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/30">
            </div>

            <div class="mb-4">
                <label for="review-text" class="block text-sm text-slate-400 mb-1">Review</label>
                <textarea id="review-text" placeholder="Write your review..." required
                          class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-slate-200 placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/30 resize-y min-h-[100px]"></textarea>
            </div>

            <button type="submit" class="px-5 py-2 bg-indigo-500 hover:bg-indigo-600 text-white rounded-lg transition-colors cursor-pointer">Submit Review</button>
            <p id="form-message" class="mt-2 text-slate-400 text-sm"></p>
        </form>

        <!-- Recent Reviews -->
        <section class="mt-10">
            <h2 class="text-2xl font-bold mb-4">Recent Reviews</h2>
            <div id="reviews-list" class="space-y-4">
                <!-- Reviews rendered by JS -->
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../../js/loadInserts.js"></script>
    <script type="module" src="../../js/pages/reviews/index.js"></script>
</body>
</html>
