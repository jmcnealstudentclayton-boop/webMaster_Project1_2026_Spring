<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviews | MovieDB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../css/styles.css">
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen flex flex-col font-sans">
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div id="nav-placeholder"></div>

    <main id="main-content" class="flex-1 max-w-6xl w-full mx-auto px-6 py-8" role="main">
        <h1 class="text-3xl font-bold mb-2">Reviews</h1>
        <p class="text-slate-400 mb-6">Browse all movie reviews from our community.</p>

        <!-- Search / filter bar -->
        <div class="mb-6">
            <input type="text" id="review-search" placeholder="Search by movie title or username..."
                   aria-label="Search reviews by movie title or username"
                   class="w-full sm:w-96 px-4 py-2 bg-slate-800 border border-slate-700 rounded-lg text-slate-200 placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/30">
        </div>

        <!-- Loading spinner -->
        <div id="review-spinner" class="hidden flex justify-center py-12">
            <div class="w-8 h-8 border-4 border-slate-600 border-t-indigo-500 rounded-full animate-spin"></div>
        </div>

        <!-- Results count -->
        <p id="review-count" class="text-slate-400 text-sm mb-4"></p>

        <!-- Reviews List -->
        <div id="reviews-list" class="space-y-4">
            <!-- Reviews rendered by JS -->
        </div>

        <!-- Pagination -->
        <nav id="review-pagination" class="flex items-center justify-center gap-4 mt-8" aria-label="Review pagination">
        </nav>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../../js/loadInserts.js"></script>
    <script type="module" src="../../js/pages/reviews/index.js"></script>
</body>
</html>
