<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watchlist | MovieDB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../css/styles.css">
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen flex flex-col font-sans">
    <div id="nav-placeholder"></div>

    <main class="flex-1 max-w-6xl w-full mx-auto px-6 py-8">
        <h1 class="text-3xl font-bold mb-2">Watchlist</h1>
        <p class="text-slate-400 mb-6">Browse all user watchlist entries.</p>

        <!-- Filter bar -->
        <div class="flex flex-wrap gap-4 mb-6">
            <select id="wl-user-filter"
                    class="px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg text-slate-200 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/30">
                <option value="">All Users</option>
            </select>
            <select id="wl-status-filter"
                    class="px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg text-slate-200 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/30">
                <option value="">All Statuses</option>
                <option value="watched">Watched</option>
                <option value="pending">Pending</option>
            </select>
        </div>

        <!-- Watchlist Table -->
        <div class="overflow-x-auto">
            <table class="w-full border-collapse">
                <thead>
                    <tr>
                        <th class="text-left px-4 py-3 text-xs uppercase tracking-wide text-slate-400 border-b border-slate-700">User</th>
                        <th class="text-left px-4 py-3 text-xs uppercase tracking-wide text-slate-400 border-b border-slate-700">Movie</th>
                        <th class="text-left px-4 py-3 text-xs uppercase tracking-wide text-slate-400 border-b border-slate-700">Added</th>
                        <th class="text-left px-4 py-3 text-xs uppercase tracking-wide text-slate-400 border-b border-slate-700">Status</th>
                    </tr>
                </thead>
                <tbody id="watchlist-body">
                    <!-- Rows rendered by JS -->
                </tbody>
            </table>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../../js/loadInserts.js"></script>
    <script type="module" src="../../js/pages/watchlist/index.js"></script>
</body>
</html>
