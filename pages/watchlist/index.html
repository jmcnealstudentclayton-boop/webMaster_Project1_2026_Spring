<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watchlist | MovieDB</title>
    <link rel="stylesheet" href="../../css/styles.css">
</head>
<body>
    <div id="nav-placeholder"></div>

    <main>
        <h1 class="page-title">My Watchlist</h1>
        <p class="page-subtitle">Manage the movies you want to watch.</p>

        <!-- Add to watchlist -->
        <form id="watchlist-form" class="card" style="max-width: 600px;">
            <div class="form-group">
                <label for="wl-user-select">User</label>
                <select id="wl-user-select" required>
                    <option value="">— Select your user —</option>
                </select>
            </div>

            <div class="form-group">
                <label for="wl-movie-select">Movie</label>
                <select id="wl-movie-select" required>
                    <option value="">— Select a movie —</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary">Add to Watchlist</button>
            <p id="wl-message" class="mt-1 text-muted"></p>
        </form>

        <!-- Current Watchlist -->
        <section class="mt-3">
            <h2>Current Watchlist</h2>
            <table class="mt-2">
                <thead>
                    <tr>
                        <th>Movie</th>
                        <th>Added</th>
                        <th>Status</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="watchlist-body">
                    <!-- Rows rendered by JS -->
                </tbody>
            </table>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../../js/loadInserts.js"></script>
    <script type="module" src="../../js/pages/watchlist/index.js"></script>
</body>
</html>
